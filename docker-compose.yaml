version: "3.8"

services:
  # ============================================================================
  # Database & Cache Layer
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg18
    container_name: bayt-alhikmah-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./src/maktaba/migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bayt-alhikmah
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bayt-alhikmah-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_DEFAULT_SERVER: ${PGADMIN_DEFAULT_SERVER:-postgres}
      PGADMIN_SERVER_PORT: ${PGADMIN_SERVER_PORT:-5432}
      PGADMIN_SERVER_HOST: ${PGADMIN_SERVER_HOST:-postgres}
      PGADMIN_SERVER_USER: ${PGADMIN_SERVER_USER:-postgres}
      PGADMIN_SERVER_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGADMIN_DEFAULT_DATABASE: ${PGADMIN_DEFAULT_DATABASE:-maktaba}
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE:-single}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bayt-alhikmah
    restart: unless-stopped

