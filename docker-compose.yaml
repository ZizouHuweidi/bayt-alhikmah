version: "3.8"

services:
  # ============================================================================
  # Database & Cache Layer
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg18
    container_name: bayt-alhikmah-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bayt-alhikmah
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bayt-alhikmah-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_DEFAULT_SERVER: ${PGADMIN_DEFAULT_SERVER:-postgres}
      PGADMIN_SERVER_PORT: ${PGADMIN_SERVER_PORT:-5432}
      PGADMIN_SERVER_HOST: ${PGADMIN_SERVER_HOST:-postgres}
      PGADMIN_SERVER_USER: ${PGADMIN_SERVER_USER:-postgres}
      PGADMIN_SERVER_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGADMIN_DEFAULT_DATABASE: ${PGADMIN_DEFAULT_DATABASE:-maktaba}
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE:-single}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bayt-alhikmah
    restart: unless-stopped

  # meilisearch:
  #   image: getmeili/meilisearch:v1.5
  #   container_name: bayt-alhikmah-meilisearch
  #   ports:
  #     - "${MEILISEARCH_PORT:-7700}:7700"
  #   volumes:
  #     - meilisearch_data:/meili_data
  #   environment:
  #     MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-meilisearch_dev_key}
  #     MEILI_ENV: development
  #   healthcheck:
  #     test:
  #       [
  #         "CMD",
  #         "wget",
  #         "--no-verbose",
  #         "--tries=1",
  #         "--spider",
  #         "http://localhost:7700/health",
  #       ]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - bayt-alhikmah
  #   restart: unless-stopped

  # ============================================================================
  # Application Services
  # ============================================================================
  maktaba:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bayt-alhikmah
    ports:
      - "${MAKTABA_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${MAKTABA_DB_URL:-postgres://maktaba:maktaba@postgres:5432/maktaba?sslmode=disable}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bayt-alhikmah
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  bayt-alhikmah:
    driver: bridge

volumes:
  postgres_data:
  # meilisearch_data:
