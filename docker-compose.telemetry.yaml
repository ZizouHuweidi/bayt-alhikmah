version: "3.8"

services:
  # Telemetry Stack
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: bayt-alhikmah-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry
      - bayt-alhikmah
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: bayt-alhikmah-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry
      - bayt-alhikmah
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: bayt-alhikmah-loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki_data:/loki
      - ./configs/loki/loki-config.yml:/etc/loki/loki-config.yml
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - telemetry
      - bayt-alhikmah
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.3.0
    container_name: bayt-alhikmah-tempo
    ports:
      - "4317:4317"
      - "4318:4318"
      - "3200:3200"
    volumes:
      - tempo_data:/tmp/tempo
      - ./configs/tempo/tempo.yml:/etc/tempo/tempo.yml
    command: -config.file=/etc/tempo/tempo.yml
    networks:
      - telemetry
      - bayt-alhikmah
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: bayt-alhikmah-alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    networks:
      - telemetry
      - bayt-alhikmah
    restart: unless-stopped

networks:
  telemetry:
    driver: bridge
  bayt-alhikmah:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  alertmanager_data:
