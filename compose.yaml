services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maktaba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maktaba}
      POSTGRES_DB: ${POSTGRES_DB:-maktaba}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-maktaba} -d $${POSTGRES_DB:-maktaba}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Containerfile
    image: bayt-alhikmah:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-maktaba}:${POSTGRES_PASSWORD:-maktaba}@postgres:5432/${POSTGRES_DB:-maktaba}?sslmode=disable
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:5173,http://localhost:5173}
      AUTH_ISSUER: ${AUTH_ISSUER:-bayt-alhikmah}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:-bayt-alhikmah-api}
      AUTH_ED25519_PRIVATE_KEY: ${AUTH_ED25519_PRIVATE_KEY:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      args:
        VITE_MAKTABA_API_URL: ${VITE_MAKTABA_API_URL:-http://localhost:8080}
    image: bayt-alhikmah-frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      PORT: 3000
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
